services:
  egov-agent:
    build: .
    container_name: egov-maroc-agent
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
